<div class="d-flex flex-column align-items-center text-center confirm-dialog-wrapper">

  <div class="mb-3">
    <div class="confirm-icon-circle d-flex align-items-center justify-content-center rounded-circle">
      <mat-icon class="confirm-icon">delete_forever</mat-icon>
    </div>
  </div>

  <h2 mat-dialog-title class="fw-bold mb-1 confirm-title">{{ data.title }}</h2>

  <mat-dialog-content class="confirm-content">
    <p class="text-secondary mb-0 confirm-message">{{ data.message }}</p>
  </mat-dialog-content>

  <mat-dialog-actions class="d-flex justify-content-center gap-3 w-100 pb-2">
    <button mat-stroked-button class="confirm-btn" [mat-dialog-close]="false">
      Cancel
    </button>
    <button mat-raised-button color="warn"
            class="d-flex align-items-center gap-1 confirm-btn"
            [mat-dialog-close]="true">
      <mat-icon>delete</mat-icon>
      {{ data.confirmLabel ?? 'Delete' }}
    </button>
  </mat-dialog-actions>

</div>
